<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <title>Yiban 的 blog - 文章</title>
  <link rel="stylesheet" href="style.css">
  <link rel="icon" href="images/favicon.png" type="image/png">
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/font-awesome@4.7.0/css/font-awesome.min.css">
</head>
<body>

<div class="win11-loader" id="loader">
  <div class="win11-spinner"></div>
</div>

<div class="navbar glass">
  <div class="nav-logo">Yiban的博客</div>
  <div class="nav-links">
    <a href="index.html">首页</a>
    <a href="articles.html">文章</a>
    <a href="archive.html">归档</a>
  </div>
  <div class="nav-right">
    <button class="theme-toggle glass" id="themeBtn">
      <i class="fa fa-moon-o"></i>
    </button>
  </div>
</div>

<div class="container">
  <div class="card glass article-page">
    <h1>我的文章</h1>
    <a href="index.html" class="back-btn">← 返回首页</a>

    <div class="article-list">
      <div class="article-item">
        <h3>hello world</h3>
        <p>发布时间：2026-04-06</p>
        <a href="1.html" class="read-btn">阅读全文</a>
      </div>
      <div class="article-item">
        <h3>Windows毛玻璃效果实现教程</h3>
        <p>发布时间：2026-04-06</p>
        <a href="2.html" class="read-btn">阅读全文</a>
      </div>
    </div>
  </div>
</div>

<script>
  const btn = document.getElementById('themeBtn');
  const html = document.documentElement;

  function updateThemeIcon() {
    if (html.hasAttribute('data-theme')) {
      btn.innerHTML = '<i class="fa fa-sun-o"></i>';
    } else {
      btn.innerHTML = '<i class="fa fa-moon-o"></i>';
    }
  }

  btn.addEventListener('click', () => {
    html.toggleAttribute('data-theme');
    updateThemeIcon();
  });
  updateThemeIcon();

  window.addEventListener('load', () => {
    setTimeout(() => {
      const loader = document.getElementById('loader');
      loader.style.opacity = '0';
      setTimeout(() => loader.style.display = 'none', 500);
    }, 700);
  });

  const ripple = document.createElement('div');
  ripple.className = 'ripple';
  document.body.appendChild(ripple);
  document.addEventListener('click', (e) => {
    ripple.style.left = e.clientX + 'px';
    ripple.style.top = e.clientY + 'px';
    ripple.classList.add('active');
    setTimeout(() => ripple.classList.remove('active'), 500);
  });
</script>

</body>
</html>
