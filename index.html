<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Yiban 的 blog</title>
  <link rel="stylesheet" href="style.css">
  <link rel="icon" href="images/favicon.png" type="image/png">
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/font-awesome/4.7.0/css/font-awesome.min.css">
  <style>
    .typewriter {
      display: inline-block;
      border-right: 3px solid #fff;
      white-space: nowrap;
      overflow: hidden;
    }
    @keyframes blink {
      50% { border-color: transparent; }
    }
    .typewriter.blinking {
      animation: blink 1s step-end infinite;
    }
  </style>
</head>
<body>

<div class="win11-loader" id="loader">
  <div class="win11-spinner"></div>
</div>

<div class="navbar glass">
  <div class="nav-logo">Yiban的博客</div>
  <div class="nav-links">
    <a href="index.html">首页</a>
    <a href="articles.html">文章</a>
    <a href="archive.html">归档</a>
  </div>
  <div class="nav-right">
    <button class="theme-toggle glass" id="themeBtn">
      <i class="fa fa-moon-o" aria-hidden="true"></i>
    </button>
  </div>
</div>

<div class="container">
  <div class="card glass">
    <div class="avatar">
      <img src="images/favicon.png" alt="头像">
    </div>

    <h1><span class="typewriter" id="nameText"></span></h1>

    <p class="bio">热爱编程、分享技术与生活</p>

    <div class="contact">
      <p>邮箱：bxhnm@gmail.com</p>
      <p>微信：Yiban_official</p>
    </div>

    <div class="links">
      <a href="https://github.com/li-shen126" target="_blank" class="btn">GitHub</a>
      <a href="https://space.bilibili.com/3461565118417085" target="_blank" class="btn">哔哩哔哩</a>
      <a href="articles.html" class="btn">我的文章</a>
    </div>
  </div>
</div>

<script>
  // 主题切换
  const btn = document.getElementById('themeBtn');
  const html = document.documentElement;

  function updateThemeIcon() {
    if (html.hasAttribute('data-theme')) {
      btn.innerHTML = '<i class="fa fa-sun-o" aria-hidden="true"></i>';
    } else {
      btn.innerHTML = '<i class="fa fa-moon-o" aria-hidden="true"></i>';
    }
  }

  btn.addEventListener('click', () => {
    html.toggleAttribute('data-theme');
    updateThemeIcon();
  });
  
  // 初始化图标
  updateThemeIcon();

  // 加载动画
  window.addEventListener('load', () => {
    setTimeout(() => {
      const loader = document.getElementById('loader');
      loader.style.opacity = '0';
      setTimeout(() => loader.style.display = 'none', 500);
    }, 700);
  });

  // 水波纹
  const ripple = document.createElement('div');
  ripple.className = 'ripple';
  document.body.appendChild(ripple);
  document.addEventListener('click', (e) => {
    ripple.style.left = e.clientX + 'px';
    ripple.style.top = e.clientY + 'px';
    ripple.classList.add('active');
    setTimeout(() => ripple.classList.remove('active'), 500);
  });

  // 打字机效果
  const nameEl = document.getElementById('nameText');
  const text = "Yiban";
  let index = 0;

  function type() {
    if (index < text.length) {
      nameEl.textContent += text.charAt(index);
      index++;
      setTimeout(type, 150);
    } else {
      nameEl.classList.add('blinking');
    }
  }

  setTimeout(type, 600);
</script>

</body>
</html>
