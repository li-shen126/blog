<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Yiban 的 blog</title>
  <link rel="stylesheet" href="style.css">
  <link rel="icon" href="images/favicon.png" type="image/png">
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/font-awesome/4.7.0/css/font-awesome.min.css">
  <style>
    .typewriter {
      display: inline-block;
      border-right: 3px solid #fff;
      white-space: nowrap;
      overflow: hidden;
    }
    @keyframes blink {
      50% { border-color: transparent; }
    }
    .typewriter.blinking {
      animation: blink 1s step-end infinite;
    }

    /* 雪花专用动画 —— 绝对不影响背景 */
    @keyframes snow-fall {
      0% {
        transform: translate3d(0, 0, 0) rotate(0deg);
        opacity: 1;
      }
      100% {
        transform: translate3d(60px, 100vh, 0) rotate(360deg);
        opacity: 0;
      }
    }
    .snowflake {
      position: fixed;
      top: -10px;
      z-index: 9999;
      color: rgba(255,255,255,0.9);
      pointer-events: none;
      user-select: none;
    }
  </style>
</head>
<body>

<div class="win11-loader" id="loader">
  <div class="win11-spinner"></div>
</div>

<div class="navbar glass">
  <div class="nav-logo">Yiban的博客</div>
  <div class="nav-links">
    <a href="index.html">首页</a>
    <a href="articles.html">文章</a>
    <a href="archive.html">归档</a>
  </div>
  <div class="nav-right">
    <button class="theme-toggle glass" id="themeBtn">
      <i class="fa fa-moon-o"></i>
    </button>
  </div>
</div>

<div class="container">
  <div class="card glass">
    <div class="avatar">
      <img src="images/favicon.png" alt="头像">
    </div>
    <h1><span class="typewriter" id="nameText"></span></h1>
    <p class="bio">热爱编程、分享技术与生活</p>
    <div class="contact">
      <p>邮箱：bxhnmthm@gmail.com</p>
      <p>微信：BXlishen114514</p>
    </div>
    <div class="links">
      <a href="https://github.com/li-shen126" target="_blank" class="btn">GitHub</a>
      <a href="https://space.bilibili.com/3461565118417085" target="_blank" class="btn">哔哩哔哩</a>
      <a href="articles.html" class="btn">我的文章</a>
    </div>
  </div>
</div>

<script>
// 主题切换
const btn = document.getElementById('themeBtn');
const html = document.documentElement;

function updateThemeIcon() {
  if (html.getAttribute('data-theme') === 'dark') {
    btn.innerHTML = '<i class="fa fa-sun-o"></i>';
  } else {
    btn.innerHTML = '<i class="fa fa-moon-o"></i>';
  }
}

btn.addEventListener('click', () => {
  if (html.getAttribute('data-theme') === 'dark') {
    html.removeAttribute('data-theme');
  } else {
    html.setAttribute('data-theme', 'dark');
  }
  updateThemeIcon();
});
updateThemeIcon();

// 加载动画
window.addEventListener('load', () => {
  setTimeout(() => {
    const loader = document.getElementById('loader');
    loader.style.opacity = '0';
    setTimeout(() => loader.style.display = 'none', 500);
  }, 700);
});

// 点击水波纹
const ripple = document.createElement('div');
ripple.className = 'ripple';
document.body.appendChild(ripple);
document.addEventListener('click', (e) => {
  ripple.style.left = e.clientX + 'px';
  ripple.style.top = e.clientY + 'px';
  ripple.classList.add('active');
  setTimeout(() => ripple.classList.remove('active'), 500);
});

// 打字机
const nameEl = document.getElementById('nameText');
const text = "Yiban";
let index = 0;
function type() {
  if (index < text.length) {
    nameEl.textContent += text[index];
    index++;
    setTimeout(type, 150);
  } else {
    nameEl.classList.add('blinking');
  }
}
setTimeout(type, 600);

// 雪花飘落（完全不影响背景版）
function createSnow() {
  const snow = document.createElement('div');
  snow.classList.add('snowflake');
  snow.textContent = '❄';

  const size = Math.random() * 12 + 10;
  const left = Math.random() * window.innerWidth;
  const speed = Math.random() * 4 + 6;

  snow.style.cssText = `
    font-size: ${size}px;
    left: ${left}px;
    animation: snow-fall ${speed}s linear forwards;
  `;

  document.body.appendChild(snow);
  setTimeout(() => snow.remove(), speed * 1000);
}

setInterval(createSnow, 220);
</script>
</body>
</html>
