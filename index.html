<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Yiban 的 blog</title>
  <link rel="stylesheet" href="style.css">
  <link rel="icon" href="images/favicon.png" type="image/png">
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/font-awesome/4.7.0/css/font-awesome.min.css">
  <style>
    .typewriter {
      display: inline-block;
      border-right: 3px solid #fff;
      white-space: nowrap;
      overflow: hidden;
    }
    @keyframes blink {
      50% { border-color: transparent; }
    }
    .typewriter.blinking {
      animation: blink 1s step-end infinite;
    }
  </style>
</head>
<body>

<div class="win11-loader" id="loader">
  <div class="win11-spinner"></div>
</div>

<div class="navbar glass">
  <div class="nav-logo">Yiban的博客</div>
  <div class="nav-links">
    <a href="index.html">首页</a>
    <a href="articles.html">文章</a>
    <a href="archive.html">归档</a>
  </div>
  <button class="theme-toggle" id="themeBtn">
    <i class="fa fa-moon-o"></i>
  </button>
</div>

<div class="container">
  <div class="card glass">
    <div class="avatar">
      <img src="images/favicon.png" alt="头像">
    </div>

    <h1><span class="typewriter" id="nameText"></span></h1>

    <p class="bio">热爱编程、分享技术与生活</p>

    <div class="contact">
      <p>邮箱：bxhnmthm@gmail.com</p>
      <p>微信：BXlishen114514</p>
    </div>

    <div class="links">
      <a href="https://github.com/li-shen126" target="_blank" class="btn">GitHub</a>
      <a href="https://space.bilibili.com/3461565118417085" target="_blank" class="btn">哔哩哔哩</a>
      <a href="articles.html" class="btn">我的文章</a>
    </div>
  </div>
</div>

<script>
  const btn = document.getElementById('themeBtn');
  const html = document.documentElement;

  function updateTheme() {
    if (html.hasAttribute('data-theme')) {
      btn.innerHTML = '<i class="fa fa-sun-o"></i>';
    } else {
      btn.innerHTML = '<i class="fa fa-moon-o"></i>';
    }
  }

  btn.addEventListener('click', function () {
    html.toggleAttribute('data-theme');
    updateTheme();
  });

  updateTheme();

  window.addEventListener('load', () => {
    setTimeout(() => {
      const loader = document.getElementById('loader');
      loader.style.opacity = '0';
      setTimeout(() => loader.style.display = 'none', 500);
    }, 700);
  });

  const ripple = document.createElement('div');
  ripple.className = 'ripple';
  document.body.appendChild(ripple);
  document.addEventListener('click', (e) => {
    ripple.style.left = e.clientX + 'px';
    ripple.style.top = e.clientY + 'px';
    ripple.classList.add('active');
    setTimeout(() => ripple.classList.remove('active'), 500);
  });

  const nameEl = document.getElementById('nameText');
  const text = "Yiban";
  let index = 0;

  function type() {
    if (index < text.length) {
      nameEl.textContent += text.charAt(index);
      index++;
      setTimeout(type, 150);
    } else {
      nameEl.classList.add('blinking');
    }
  }

  setTimeout(type, 600);
</script>

<!-- 稳定雪花特效 - 不影响任何页面元素 -->
<style>
.snowflake {
  position: fixed;
  top: -8px;
  z-index: 9999;
  pointer-events: none;
  user-select: none;
  color: rgba(255, 255, 255, 0.85);
}
</style>

<script>
function createSnow() {
  let f = document.createElement('div');
  f.className = 'snowflake';
  f.textContent = '❄';

  // 随机大小
  let size = Math.random() * 12 + 10;
  f.style.fontSize = size + 'px';

  // 随机水平位置
  f.style.left = Math.random() * window.innerWidth + 'px';

  // 随机飘落速度
  let duration = Math.random() * 4 + 6;
  f.style.animation = `snowfall_${Math.random().toString(36).slice(2)} ${duration}s linear forwards`;

  let style = document.createElement('style');
  let animName = f.style.animation.split(' ')[0];
  style.textContent = `
    @keyframes ${animName} {
      0% { transform: translateY(0) rotate(0deg); opacity: 1; }
      100% { transform: translateY(100vh) rotate(360deg); opacity: 0; }
    }
  `;
  document.head.appendChild(style);
  document.body.appendChild(f);

  setTimeout(() => {
    f.remove();
    style.remove();
  }, duration * 1000);
}

// 每200ms一片雪花
setInterval(createSnow, 200);
</script>

  
</body>
</html>
