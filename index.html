<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Yiban 的 blog</title>
  <link rel="stylesheet" href="style.css">
  <link rel="icon" href="images/favicon.png" type="image/png">
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/font-awesome@4.7.0/css/font-awesome.min.css">
</head>
<body>

<!-- Win11 加载动画 -->
<div class="win11-loader" id="loader">
  <div class="win11-spinner"></div>
</div>

<div class="navbar glass">
  <div class="nav-logo">Yiban的博客</div>
  
  <div class="nav-links">
    <a href="index.html">首页</a>
    <a href="articles.html">文章</a>
    <a href="archive.html">归档</a>
  </div>

  <!-- 右侧：搜索框 左 → 切换按钮 右，强制横向 -->
  <div class="nav-right">
    <div class="search-box glass">
      <input type="text" id="searchInput" placeholder="搜索文章...">
      <i class="fa fa-search"></i>
    </div>
    <button class="theme-toggle" id="themeBtn">
      <i class="fa fa-moon-o"></i>
    </button>
  </div>
</div>

<div class="container">
  <div class="card glass">
    <div class="avatar">
      <img src="images/favicon.png" alt="头像">
    </div>
    <h1>Yiban</h1>
    <p class="bio">热爱编程、分享技术与生活</p>

    <div class="contact">
      <p>邮箱：bxhnmthm@gmail.com</p>
      <p>微信：BXlishen114514</p>
    </div>

    <div class="links">
      <a href="https://github.com/li-shen126" target="_blank" class="btn">GitHub</a>
      <a href="https://space.bilibili.com/3461565118417085" target="_blank" class="btn">哔哩哔哩</a>
      <a href="articles.html" class="btn">我的文章</a>
    </div>
  </div>
</div>

<script>
  // 修复主题切换逻辑，100% 可用
  const btn = document.getElementById('themeBtn');
  const html = document.documentElement;

  function updateThemeIcon() {
    if (html.getAttribute('data-theme') === 'dark') {
      btn.innerHTML = '<i class="fa fa-sun-o"></i>';
    } else {
      btn.innerHTML = '<i class="fa fa-moon-o"></i>';
    }
  }

  // 绑定点击事件，确保触发
  btn.addEventListener('click', () => {
    if (html.getAttribute('data-theme') === 'dark') {
      html.removeAttribute('data-theme');
    } else {
      html.setAttribute('data-theme', 'dark');
    }
    updateThemeIcon();
  });

  // 初始化图标
  updateThemeIcon();

  // Win11 加载动画
  window.addEventListener('load', () => {
    setTimeout(() => {
      const loader = document.getElementById('loader');
      loader.style.opacity = '0';
      setTimeout(() => loader.style.display = 'none', 500);
    }, 800);
  });

  // 搜索框聚焦/失焦效果（可选，增强交互）
  const searchInput = document.getElementById('searchInput');
  const searchBox = document.querySelector('.search-box');
  searchInput.addEventListener('focus', () => {
    searchBox.style.transform = 'scale(1.02)';
  });
  searchInput.addEventListener('blur', () => {
    searchBox.style.transform = 'scale(1)';
  });
</script>

</body>
</html>
