<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Yiban 的 blog</title>
  <link rel="stylesheet" href="style.css">
  <link rel="icon" href="images/favicon.png" type="image/png">
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/font-awesome/4.7.0/css/font-awesome.min.css">
  <style>
    .typewriter {
      display: inline-block;
      border-right: 3px solid #fff;
      white-space: nowrap;
      overflow: hidden;
    }
    @keyframes blink {
      50% { border-color: transparent; }
    }
    .typewriter.blinking {
      animation: blink 1s step-end infinite;
    }
  </style>
</head>
<body>

<div class="win11-loader" id="loader">
  <div class="win11-spinner"></div>
</div>

<div class="navbar glass">
  <div class="nav-logo">Yiban的博客</div>
  <div class="nav-links">
    <a href="index.html">首页</a>
    <a href="articles.html">文章</a>
    <a href="archive.html">归档</a>
  </div>
  <button class="theme-toggle" id="themeBtn">
    <i class="fa fa-moon-o"></i>
  </button>
</div>

<div class="container">
  <div class="card glass">
    <div class="avatar">
      <img src="images/favicon.png" alt="头像">
    </div>

    <h1><span class="typewriter" id="nameText"></span></h1>

    <p class="bio">热爱编程、分享技术与生活</p>

    <div class="contact">
      <p>邮箱：bxhnmthm@gmail.com</p>
      <p>微信：BXlishen114514</p>
    </div>

    <div class="links">
      <a href="https://github.com/li-shen126" target="_blank" class="btn">GitHub</a>
      <a href="https://space.bilibili.com/3461565118417085" target="_blank" class="btn">哔哩哔哩</a>
      <a href="articles.html" class="btn">我的文章</a>
    </div>
  </div>
</div>

<script>
  const btn = document.getElementById('themeBtn');
  const html = document.documentElement;

  function updateTheme() {
    if (html.hasAttribute('data-theme')) {
      btn.innerHTML = '<i class="fa fa-sun-o"></i>';
    } else {
      btn.innerHTML = '<i class="fa fa-moon-o"></i>';
    }
  }

  btn.addEventListener('click', function () {
    html.toggleAttribute('data-theme');
    updateTheme();
  });

  updateTheme();

  window.addEventListener('load', () => {
    setTimeout(() => {
      const loader = document.getElementById('loader');
      loader.style.opacity = '0';
      setTimeout(() => loader.style.display = 'none', 500);
    }, 700);
  });

  const ripple = document.createElement('div');
  ripple.className = 'ripple';
  document.body.appendChild(ripple);
  document.addEventListener('click', (e) => {
    ripple.style.left = e.clientX + 'px';
    ripple.style.top = e.clientY + 'px';
    ripple.classList.add('active');
    setTimeout(() => ripple.classList.remove('active'), 500);
  });

  const nameEl = document.getElementById('nameText');
  const text = "Yiban";
  let index = 0;

  function type() {
    if (index < text.length) {
      nameEl.textContent += text.charAt(index);
      index++;
      setTimeout(type, 150);
    } else {
      nameEl.classList.add('blinking');
    }
  }

  setTimeout(type, 600);
</script>

<!-- 雪花飘落特效 -->
<style>
.snow {
  position: fixed;
  top: -10px;
  z-index: 9999;
  color: #fff;
  pointer-events: none;
  user-select: none;
  animation: snowfall linear infinite;
}
@keyframes snowfall {
  0% {
    transform: translate(0, 0) rotate(0deg);
    opacity: 1;
  }
  100% {
    transform: translate(100px, 100vh) rotate(360deg);
    opacity: 0;
  }
}
</style>

<script>
function createSnow() {
  const snow = document.createElement('div');
  snow.className = 'snow';
  snow.innerText = '❄';
  // 随机大小、位置、时长
  const size = Math.random() * 10 + 10;
  const left = Math.random() * window.innerWidth;
  const duration = Math.random() * 3 + 5;

  snow.style.fontSize = size + 'px';
  snow.style.left = left + 'px';
  snow.style.animationDuration = duration + 's';

  document.body.appendChild(snow);

  // 动画结束移除
  setTimeout(() => {
    snow.remove();
  }, duration * 1000);
}

// 持续生成雪花
setInterval(createSnow, 200);
</script>

  
</body>
</html>
