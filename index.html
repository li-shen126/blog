<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Yiban 的 blog</title>
  <link rel="stylesheet" href="style.css">
  <link rel="icon" href="images/favicon.png" type="image/png">
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/font-awesome@4.7.0/css/font-awesome.min.css">
</head>
<body>

<!-- Win11 加载动画 -->
<div class="win11-loader" id="loader">
  <div class="win11-spinner"></div>
</div>

<div class="navbar glass">
  <div class="nav-logo">Yiban的博客</div>

  <div class="nav-links">
    <a href="index.html">首页</a>
    <a href="articles.html">文章</a>
    <a href="archive.html">归档</a>
  </div>

  <!-- 右侧：搜索框 (左) + 主题按钮 (右) -->
  <div class="nav-right">
    <!-- 搜索框 -->
    <div class="search-container glass">
      <input type="text" id="searchInput" placeholder="搜索文章..." autocomplete="off">
      <button class="search-btn" id="searchBtn"><i class="fa fa-search"></i></button>
    </div>

    <!-- 主题切换 -->
    <button class="theme-toggle glass" id="themeBtn">
      <i class="fa fa-moon-o"></i>
    </button>
  </div>
</div>

<div class="container">
  <div class="card glass">
    <div class="avatar">
      <img src="images/favicon.png" alt="头像">
    </div>
    <h1>Yiban</h1>
    <p class="bio">热爱编程、分享技术与生活</p>

    <div class="contact">
      <p>邮箱：bxhnmthm@gmail.com</p>
      <p>微信：BXlishen114514</p>
    </div>

    <div class="links">
      <a href="https://github.com/li-shen126" target="_blank" class="btn">GitHub</a>
      <a href="https://space.bilibili.com/3461565118417085" target="_blank" class="btn">哔哩哔哩</a>
      <a href="articles.html" class="btn">我的文章</a>
    </div>
  </div>
</div>

<!-- 搜索结果展示区 -->
<div id="searchResults" class="search-results glass"></div>

<script>
  // ---------------------- 1. 主题切换 (完全可用) ----------------------
  const btn = document.getElementById('themeBtn');
  const html = document.documentElement;

  function updateThemeIcon() {
    if (html.hasAttribute('data-theme')) {
      btn.innerHTML = '<i class="fa fa-sun-o"></i>';
    } else {
      btn.innerHTML = '<i class="fa fa-moon-o"></i>';
    }
  }

  btn.addEventListener('click', () => {
    html.toggleAttribute('data-theme');
    updateThemeIcon();
  });
  updateThemeIcon();

  // ---------------------- 2. Win11 加载动画 ----------------------
  window.addEventListener('load', () => {
    setTimeout(() => {
      const loader = document.getElementById('loader');
      loader.style.opacity = '0';
      setTimeout(() => loader.style.display = 'none', 500);
    }, 700);
  });

  // ---------------------- 3. 真实搜索功能 (可搜索文章标题) ----------------------
  // 你需要在同级目录创建一个 articles.json 存放你的文章数据
  let articlesData = [];

  // 模拟文章数据（如果没有 articles.json，就用这个）
  const defaultArticles = [
    { title: "Windows 11 毛玻璃博客搭建教程", content: "本文详细介绍如何使用 HTML CSS 打造 Windows 11 风格的个人博客..." },
    { title: "JavaScript 前端搜索功能实现", content: "纯前端实现文章搜索，支持模糊匹配、忽略大小写..." },
    { title: "Flex 布局彻底搞定导航栏", content: "Flex 是现代布局的核心，一文带你理解 Flex 导航栏的所有细节..." },
  ];

  // 尝试加载本地 JSON（如果不存在就用默认数据）
  fetch('articles.json')
    .then(res => res.json())
    .then(data => {
      articlesData = data;
    })
    .catch(() => {
      console.log("未检测到 articles.json，使用默认文章数据");
      articlesData = defaultArticles;
    });

  // 搜索逻辑
  const searchInput = document.getElementById('searchInput');
  const searchResults = document.getElementById('searchResults');

  function performSearch() {
    const query = searchInput.value.trim().toLowerCase();
    searchResults.innerHTML = '';

    if (!query) return;

    const results = articlesData.filter(article =>
      article.title.toLowerCase().includes(query) ||
      article.content.toLowerCase().includes(query)
    );

    if (results.length === 0) {
      searchResults.innerHTML = '<div class="result-item">未找到相关文章</div>';
      return;
    }

    results.forEach(article => {
      searchResults.innerHTML += `
        <div class="result-item glass">
          <h3>${article.title}</h3>
          <p>${article.content.substring(0, 100)}...</p>
        </div>
      `;
    });
  }

  // 绑定搜索事件
  searchInput.addEventListener('input', performSearch);
  document.getElementById('searchBtn').addEventListener('click', performSearch);
</script>

</body>
</html>
